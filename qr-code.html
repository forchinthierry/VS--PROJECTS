      color: #2b3773;
      font-weight: bold;
      margin-top: 12px;

      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      margin-top: 18px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;

      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(22,160,133,0.3);

  <script>
    function drawQRWithLogo() {
      var url = 'https://gspiritloans.com';
      var qr = qrcode(0, 'H'); // type 0 = auto-detect size, H = highest error correction
      qr.addData(url);
      qr.make();

      var moduleCount = qr.getModuleCount();
      var canvas = document.getElementById('qrCanvas');
      var size = canvas.width;
      var moduleSize = size / moduleCount;
      var ctx = canvas.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      ctx.fillStyle = '#2b3773';
      for (var row = 0; row < moduleCount; row++) {
        for (var col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(col * moduleSize, row * moduleSize, moduleSize, moduleSize);
          }
        }
      }

      var logo = new Image();
      logo.crossOrigin = 'anonymous';
      logo.onload = function () {
        var logoSize = size * 0.22;
        var logoX = (size - logoSize) / 2;
        var logoY = (size - logoSize) / 2;
        var pad = 8;

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(logoX - pad, logoY - pad, logoSize + pad * 2, logoSize + pad * 2, 10);
        ctx.fill();

        ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
      };
      logo.onerror = function () {
        console.warn('Logo failed to load; QR code generated without it.');
      };
      logo.src = LOGO_DATA_URI;
    }

    function downloadQR() {
      var canvas = document.getElementById('qrCanvas');
      var link = document.createElement('a');
      link.download = 'GSpiritLoans_QRCode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    window.addEventListener('load', drawQRWithLogo);
  </script>

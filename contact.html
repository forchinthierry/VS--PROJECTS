<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Contact G-Spirit Loan Solution</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at 20% 15%, #f7d9d9 0%, #e9b5b5 45%, #dba3c4 100%);
      margin: 0;
      padding: 0;
      color: #333;
      opacity: 1;
      transition: opacity 0.25s ease;
      position: relative;
      overflow-x: hidden;
    }

    .ambient {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0.05) 60%);
      pointer-events: none;
      z-index: 0;
      animation: drift 14s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-30px) translateX(12px); }
    }

    .a1 { width: 60px; height: 60px; top: 10%; left: 8%; animation-duration: 11s; }
    .a2 { width: 30px; height: 30px; top: 22%; right: 10%; animation-duration: 9s; animation-delay: 1s; }
    .a3 { width: 90px; height: 90px; bottom: 15%; left: 6%; animation-duration: 16s; animation-delay: 2s; }
    .a4 { width: 45px; height: 45px; bottom: 25%; right: 8%; animation-duration: 13s; animation-delay: 0.5s; }

    body.is-exiting {
      opacity: 0;
    }

    body.is-entering {
      opacity: 0;
    }

    .page-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 9999;
    }

    .page-overlay.is-visible {
      opacity: 1;
    }

    header {
      background-color: #2b3773;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    header img {
      max-height: 80px;
      width: auto;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      width: 33%;
      min-width: 180px;
      gap: 4px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      color: white;
    }

    .tagline {
      font-size: 14px;
      font-style: italic;
      color: #d0e8ef;
      margin: 0;
    }

    .header-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      width: auto;
      min-width: 0;
      flex-wrap: wrap;
    }

    .header-actions button {
      background: none;
      color: white;
      border: none;
      -webkit-appearance: none;
      appearance: none;
      padding: 4px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
    }

    .header-actions button:hover {
      text-decoration: underline;
      background: transparent;
    }

    .page-body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 100px);
      padding: 30px 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 30px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      text-align: center;
      position: relative;
      z-index: 2;
      animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardPop {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      margin-top: 0;
      color: #2b3773;
      font-size: 24px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      padding: 14px 16px;
      border-radius: 999px;
      font-weight: bold;
      opacity: 0;
      transform: translateY(14px);
      animation: linkRise 0.45s ease forwards;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .links a:nth-child(1) { animation-delay: 0.05s; }
    .links a:nth-child(2) { animation-delay: 0.12s; }
    .links a:nth-child(3) { animation-delay: 0.19s; }
    .links a:nth-child(4) { animation-delay: 0.26s; }
    .links a:nth-child(5) { animation-delay: 0.33s; }

    @keyframes linkRise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .links a:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      filter: brightness(1.08);
    }

    .links a:active {
      transform: scale(0.96);
    }

    .link-icon {
      font-size: 18px;
    }

    .facebook {
      background-color: #1877f2;
    }

    .instagram {
      background: linear-gradient(45deg, #f09433, #dc2743, #cc2366, #bc1888);
    }

    .call {
      background-color: #16a085;
    }

    .email {
      background-color: #2b3773;
    }

    .whatsapp {
      background-color: #25D366;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 14px;
    }

    .floating-apply-btn {
      position: fixed;
      right: 20px;
      bottom: 24px;
      z-index: 60;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #e2a63b, #c98a1f 70%, #f3c865);
      color: #4a2e00;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 12px 25px rgba(201, 138, 31, 0.28);
      animation: floatPulse 2.2s ease-in-out infinite;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .floating-apply-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 16px 30px rgba(201, 138, 31, 0.35);
    }

    .floating-apply-btn:active {
      transform: scale(0.97);
    }

    .floating-apply-btn .icon {
      font-size: 16px;
    }

    @keyframes floatPulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .footer-links {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .footer-links a {
      color: #2b3773;
      text-decoration: none;
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid #2b3773;
      border-radius: 999px;
      background: white;
    }

    .footer-links a:hover {
      background: #2b3773;
      color: white;
    }

    @media (max-width: 600px) {
      header {
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 10px;
        padding: 12px;
      }

      header img {
        max-height: 44px;
      }

      .brand {
        width: auto;
        min-width: 0;
        align-items: flex-start;
        text-align: left;
      }

      header h1 {
        font-size: 15px;
      }

      .tagline {
        font-size: 11px;
      }

      .header-actions {
        width: 100%;
        min-width: 0;
        justify-content: flex-start;
        flex-wrap: wrap;
        gap: 6px;
      }

      .header-actions button {
        font-size: 10px;
        padding: 5px 6px;
      }
    }
  </style>
</head>
<body>

  <div class="ambient a1"></div>
  <div class="ambient a2"></div>
  <div class="ambient a3"></div>
  <div class="ambient a4"></div>

  <header>
    <img src="logo.png" alt="G-Spirit logo">
    <div class="brand">
      <h1>G-SPIRIT LOAN SOLUTION</h1>
      <div class="tagline">Powering Dreams</div>
    </div>
    <div class="header-actions">
      <button type="button" onclick="navigateWithTransition('index.html')">Home</button>
      <button type="button" onclick="navigateWithTransition('terms.html')">Terms</button>
      <button type="button" onclick="navigateWithTransition('about.html')">About</button>
      <button type="button" onclick="navigateWithTransition('partner.html')">Join Us</button>
    </div>
  </header>

  <div class="page-body">
    <div class="card">
      <h1>Contact Us</h1>
      <p>Choose one of the options below.</p>
      <div class="links">
        <a class="facebook" href="https://facebook.com/gspiritloansolution" target="_blank" rel="noopener noreferrer"><span class="link-icon">📘</span>Facebook</a>
        <a class="instagram" href="https://instagram.com/gspiritloansolution" target="_blank" rel="noopener noreferrer"><span class="link-icon">📸</span>Instagram</a>
        <a class="email" href="mailto:hi@gspiritloans.com"><span class="link-icon">✉️</span>Email</a>
        <a class="whatsapp" href="https://wa.me/237620569864" target="_blank" rel="noopener noreferrer"><span class="link-icon">💬</span>WhatsApp</a>
        <a class="call" href="tel:+237673202434"><span class="link-icon">📞</span>Call</a>
      </div>
    </div>
  </div>

  <button class="floating-apply-btn" type="button" onclick="navigateWithTransition('apply.html')">
    <span class="icon">💰</span>
    <span>Apply for Loan</span>
  </button>

  <footer>
    <div class="footer-links">
      <a href="privacy.html" target="_self">Privacy Policy</a>
      <span>&copy; 2026 G-Spirit Loan Solution. All rights reserved.</span>
    </div>
  </footer>

</body>
  <script>
    (function () {
      var overlay = document.createElement('div');
      overlay.className = 'page-overlay';
      document.body.appendChild(overlay);

      window.navigateWithTransition = function (targetUrl) {
        if (!targetUrl) return false;
        document.body.classList.add('is-exiting');
        overlay.classList.add('is-visible');
        setTimeout(function () {
          window.location.href = targetUrl;
        }, 220);
        return false;
      };

      document.addEventListener('DOMContentLoaded', function () {
        requestAnimationFrame(function () {
          document.body.classList.remove('is-entering');
          overlay.classList.remove('is-visible');
        });
      });
    })();
  </script>

</html>
